<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>M.A.B-ERP - Project Manager</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      background: white;
      border-radius: 10px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
      padding: 60px 40px;
      max-width: 500px;
      text-align: center;
    }
    .logo { font-size: 60px; margin-bottom: 20px; }
    h1 { color: #333; font-size: 28px; margin-bottom: 10px; }
    p { color: #666; margin-bottom: 30px; }
    .buttons {
      display: flex;
      gap: 15px;
      justify-content: center;
    }
    a {
      display: inline-block;
      padding: 12px 30px;
      background: #667eea;
      color: white;
      text-decoration: none;
      border-radius: 5px;
      font-weight: bold;
      transition: background 0.3s;
    }
    a:hover { background: #764ba2; }
    .info {
      margin-top: 30px;
      padding-top: 30px;
      border-top: 1px solid #eee;
      font-size: 14px;
      color: #999;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">📊</div>
    <h1>M.A.B-ERP</h1>
    <p>מערכת ניהול פרויקטים לקליינטים</p>
    <div class="buttons">
      <a href="/admin/login.html">התחבר כמנהל</a>
    </div>
    <div class="info">
      <p>Majd Abu Janb © 2026</p>
      <p>Project Management System</p>
    </div>
  </div>
</body>
</html>
