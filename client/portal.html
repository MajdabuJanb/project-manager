<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>פורטל לקוח - Project Manager</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="../shared/config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --primary: #3b82f6;
      --primary-light: #eff6ff;
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
      --purple: #8b5cf6;
      --indigo: #6366f1;
      --gray: #64748b;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: #f1f5f9;
      color: #0f172a;
      min-height: 100vh;
    }

    /* ─── HEADER ─── */
    header {
      background: white;
      border-bottom: 1px solid #e2e8f0;
      padding: 0 32px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 1px 8px rgba(0,0,0,0.05);
    }
    .header-logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    /* LOGO PLACEHOLDER — replace with <img src="..." height="36"> */
    .logo-mark {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, #3b82f6, #1d4ed8);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }
    .app-name {
      font-size: 16px;
      font-weight: 700;
      color: #0f172a;
    }
    .client-info {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .client-avatar {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 700;
      font-size: 14px;
    }
    .client-name-text { font-size: 14px; font-weight: 600; color: #374151; }

    /* ─── MAIN ─── */
    main { max-width: 1100px; margin: 0 auto; padding: 36px 24px 60px; }

    .welcome {
      margin-bottom: 32px;
    }
    .welcome h1 { font-size: 26px; font-weight: 700; color: #0f172a; margin-bottom: 6px; }
    .welcome p { font-size: 14px; color: #64748b; }

    /* ─── STATES ─── */
    .loading-state, .error-state, .empty-state {
      text-align: center;
      padding: 80px 24px;
    }
    .spinner {
      width: 44px; height: 44px;
      border: 4px solid #e2e8f0;
      border-top: 4px solid var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .state-icon { font-size: 48px; margin-bottom: 16px; }
    .state-title { font-size: 18px; font-weight: 600; margin-bottom: 8px; }
    .state-sub { font-size: 14px; color: var(--gray); }

    /* ─── STATS ROW ─── */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 16px;
      margin-bottom: 32px;
    }
    .stat-card {
      background: white;
      border-radius: 12px;
      padding: 20px;
      border: 1px solid #e2e8f0;
      text-align: center;
    }
    .stat-value { font-size: 28px; font-weight: 700; color: #0f172a; margin-bottom: 4px; }
    .stat-label { font-size: 12px; color: var(--gray); font-weight: 500; }

    /* ─── PROJECT CARDS ─── */
    .projects-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 20px;
    }
    .project-card {
      background: white;
      border-radius: 14px;
      border: 1px solid #e2e8f0;
      overflow: hidden;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .project-card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.08); }
    .project-card-header {
      padding: 20px 20px 16px;
      border-bottom: 1px solid #f1f5f9;
    }
    .project-card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 10px;
    }
    .project-name { font-size: 16px; font-weight: 600; color: #0f172a; flex: 1; }
    .project-badges { display: flex; gap: 6px; flex-wrap: wrap; }
    .project-desc {
      font-size: 13px;
      color: #64748b;
      line-height: 1.5;
      margin-bottom: 14px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .project-meta {
      display: flex;
      gap: 16px;
      font-size: 12px;
      color: #94a3b8;
      margin-bottom: 14px;
    }
    .project-meta span { display: flex; align-items: center; gap: 4px; }

    /* Progress bar */
    .progress-wrap { margin-bottom: 4px; }
    .progress-label {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: #64748b;
      margin-bottom: 6px;
    }
    .progress-bar {
      height: 6px;
      background: #f1f5f9;
      border-radius: 999px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #3b82f6, #6366f1);
      border-radius: 999px;
      transition: width 0.5s ease;
    }

    /* Tasks section inside card */
    .tasks-section { padding: 0 20px 16px; }
    .tasks-toggle {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 0;
      background: none;
      border: none;
      border-top: 1px solid #f1f5f9;
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      color: #374151;
      cursor: pointer;
    }
    .tasks-toggle .chevron { transition: transform 0.2s; font-size: 11px; }
    .tasks-toggle.open .chevron { transform: rotate(180deg); }
    .tasks-list { display: none; }
    .tasks-list.open { display: block; }
    .task-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 0;
      border-bottom: 1px solid #f8fafc;
      font-size: 13px;
    }
    .task-item:last-child { border-bottom: none; }
    .task-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .task-title-text { flex: 1; color: #374151; }
    .task-due { font-size: 11px; color: #94a3b8; white-space: nowrap; }
    .no-tasks { font-size: 13px; color: #94a3b8; padding: 8px 0; }

    /* ─── BADGES ─── */
    .badge {
      display: inline-flex;
      align-items: center;
      padding: 3px 10px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 600;
      white-space: nowrap;
    }
    /* Project status */
    .badge-planning  { background: #eef2ff; color: #4f46e5; }
    .badge-active    { background: #ecfdf5; color: #059669; }
    .badge-paused    { background: #fffbeb; color: #d97706; }
    .badge-completed { background: #eff6ff; color: #2563eb; }
    .badge-cancelled { background: #f1f5f9; color: #64748b; }
    /* Urgency */
    .badge-low    { background: #f1f5f9; color: #64748b; }
    .badge-medium { background: #fffbeb; color: #d97706; }
    .badge-high   { background: #fef2f2; color: #dc2626; }
    /* Task status dot colors */
    .dot-pending    { background: #94a3b8; }
    .dot-in_progress { background: #3b82f6; }
    .dot-completed  { background: #10b981; }
    .dot-blocked    { background: #ef4444; }

    /* ─── FOOTER ─── */
    footer {
      text-align: center;
      padding: 24px;
      font-size: 12px;
      color: #94a3b8;
      border-top: 1px solid #e2e8f0;
      margin-top: 60px;
    }

    @media (max-width: 600px) {
      header { padding: 0 16px; }
      main { padding: 24px 16px 40px; }
      .projects-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <header>
    <div class="header-logo">
      <!-- LOGO PLACEHOLDER: replace with <img src="../assets/logo.svg" height="36" alt="Logo"> -->
      <div class="logo-mark">📊</div>
      <span class="app-name">Project Manager</span>
    </div>
    <div class="client-info" id="headerClientInfo" style="display:none">
      <div class="client-avatar" id="clientAvatar"></div>
      <span class="client-name-text" id="clientNameHeader"></span>
    </div>
  </header>

  <main>
    <!-- Loading -->
    <div id="stateLoading" class="loading-state">
      <div class="spinner"></div>
      <p style="color:#64748b;font-size:14px">טוען את הפורטל שלך...</p>
    </div>

    <!-- Error -->
    <div id="stateError" class="error-state" style="display:none">
      <div class="state-icon">🔒</div>
      <div class="state-title">הגישה נדחתה</div>
      <div class="state-sub">הקישור אינו תקף או פג תוקפו. פנה למנהל המערכת.</div>
    </div>

    <!-- Portal Content -->
    <div id="portalContent" style="display:none">
      <div class="welcome">
        <h1 id="welcomeTitle">ברוך הבא!</h1>
        <p id="welcomeSub"></p>
      </div>

      <!-- Stats -->
      <div class="stats-row" id="statsRow"></div>

      <!-- Projects -->
      <div id="projectsGrid" class="projects-grid"></div>

      <!-- Empty projects -->
      <div id="emptyProjects" class="empty-state" style="display:none">
        <div class="state-icon">📁</div>
        <div class="state-title">אין פרויקטים עדיין</div>
        <div class="state-sub">הפרויקטים שלך יופיעו כאן לאחר שהמנהל יוסיף אותם</div>
      </div>
    </div>
  </main>

  <footer>
    <p>Project Manager &copy; 2025 — פורטל לקוח</p>
  </footer>

  <script>
    const { createClient } = supabase;
    const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const STATUS_LABELS = {
      planning: 'תכנון', active: 'פעיל', paused: 'מושהה',
      completed: 'הושלם', cancelled: 'בוטל'
    };
    const PRIORITY_LABELS = { low: 'נמוכה', medium: 'בינונית', high: 'גבוהה' };
    const TASK_STATUS_LABELS = {
      pending: 'ממתין', in_progress: 'בביצוע', completed: 'הושלם', blocked: 'חסום'
    };

    function esc(str) {
      if (!str) return '';
      return String(str)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function formatDate(dateStr) {
      if (!dateStr) return '';
      return new Date(dateStr).toLocaleDateString('he-IL', { day: '2-digit', month: '2-digit', year: 'numeric' });
    }

    function getToken() {
      return new URLSearchParams(window.location.search).get('token');
    }

    async function loadPortal() {
      const token = getToken();
      if (!token) {
        showError();
        return;
      }

      const { data, error } = await db.rpc('get_client_portal_data', { p_token: token });

      if (error || !data || data.error) {
        showError();
        return;
      }

      renderPortal(data);
    }

    function showError() {
      document.getElementById('stateLoading').style.display = 'none';
      document.getElementById('stateError').style.display = 'block';
    }

    function renderPortal(data) {
      const client = data.client;
      const projects = data.projects || [];

      // Header
      const initials = client.custname.split(' ').map(w => w[0]).slice(0, 2).join('');
      document.getElementById('clientAvatar').textContent = initials;
      document.getElementById('clientNameHeader').textContent = client.custname;
      document.getElementById('headerClientInfo').style.display = 'flex';

      // Welcome
      document.getElementById('welcomeTitle').textContent = `ברוך הבא, ${client.custname}! 👋`;
      const companyPart = client.custcomp ? ` | ${client.custcomp}` : '';
      document.getElementById('welcomeSub').textContent = `פורטל הלקוח שלך${companyPart}`;

      // Stats
      const totalProjects = projects.length;
      const activeProjects = projects.filter(p => p.status === 'active').length;
      const allTasks = projects.flatMap(p => p.tasks || []);
      const completedTasks = allTasks.filter(t => t.status === 'completed').length;

      document.getElementById('statsRow').innerHTML = `
        <div class="stat-card">
          <div class="stat-value">${totalProjects}</div>
          <div class="stat-label">סה"כ פרויקטים</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" style="color:#10b981">${activeProjects}</div>
          <div class="stat-label">פרויקטים פעילים</div>
        </div>
        <div class="stat-card">
          <div class="stat-value">${allTasks.length}</div>
          <div class="stat-label">סה"כ משימות</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" style="color:#3b82f6">${completedTasks}</div>
          <div class="stat-label">משימות הושלמו</div>
        </div>
      `;

      // Projects
      document.getElementById('stateLoading').style.display = 'none';
      document.getElementById('portalContent').style.display = 'block';

      if (projects.length === 0) {
        document.getElementById('emptyProjects').style.display = 'block';
        return;
      }

      document.getElementById('projectsGrid').innerHTML = projects.map(p => renderProjectCard(p)).join('');
    }

    function renderProjectCard(p) {
      const tasks = p.tasks || [];
      const taskCount = tasks.length;
      const completedCount = tasks.filter(t => t.status === 'completed').length;

      const tasksHtml = tasks.length > 0
        ? tasks.map(t => `
            <div class="task-item">
              <div class="task-dot dot-${t.status}"></div>
              <span class="task-title-text">${esc(t.taskname)}</span>
              ${t.duedate ? `<span class="task-due">${formatDate(t.duedate)}</span>` : ''}
              <span class="badge badge-${t.status === 'completed' ? 'completed' : t.status === 'in_progress' ? 'active' : t.status === 'blocked' ? 'high' : 'low'}"
                style="font-size:10px;padding:2px 7px">
                ${TASK_STATUS_LABELS[t.status] || t.status}
              </span>
            </div>
          `).join('')
        : '<div class="no-tasks">אין משימות לפרויקט זה</div>';

      const metaParts = [];
      if (p.sdate) metaParts.push(`📅 ${formatDate(p.sdate)}`);
      if (p.edate) metaParts.push(`🏁 ${formatDate(p.edate)}`);
      if (p.budget) metaParts.push(`💰 ${Number(p.budget).toLocaleString('he-IL')} ₪`);

      return `
        <div class="project-card">
          <div class="project-card-header">
            <div class="project-card-top">
              <div class="project-name">${esc(p.projname)}</div>
              <div class="project-badges">
                <span class="badge badge-${p.status}">${STATUS_LABELS[p.status] || p.status}</span>
                <span class="badge badge-${p.priority}">${PRIORITY_LABELS[p.priority] || p.priority}</span>
              </div>
            </div>
            ${p.projdes ? `<div class="project-desc">${esc(p.projdes)}</div>` : ''}
            ${metaParts.length ? `<div class="project-meta">${metaParts.map(m => `<span>${m}</span>`).join('')}</div>` : ''}
            <div class="progress-wrap">
              <div class="progress-label">
                <span>התקדמות</span>
                <span>${p.progress || 0}%</span>
              </div>
              <div class="progress-bar">
                <div class="progress-fill" style="width:${p.progress || 0}%"></div>
              </div>
            </div>
          </div>
          <div class="tasks-section">
            <button class="tasks-toggle" onclick="toggleTasks(this)">
              <span>משימות (${taskCount}) — ${completedCount} הושלמו</span>
              <span class="chevron">▼</span>
            </button>
            <div class="tasks-list">
              ${tasksHtml}
            </div>
          </div>
        </div>
      `;
    }

    function toggleTasks(btn) {
      btn.classList.toggle('open');
      const list = btn.nextElementSibling;
      list.classList.toggle('open');
    }

    // Boot
    loadPortal();
  </script>
</body>
</html>
